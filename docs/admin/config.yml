backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "navigation"
    label: "Navigation"
    file: "data/navigation.yaml"
    fields:
      - name: links
        label: Links
        widget: list
        fields:
          - {label: Label, name: label, widget: string}
          - {label: URL, name: url, widget: string}

  - name: "hero"
    label: "Hero Section"
    file: "data/hero.yaml"
    fields:
      - {label: Headline, name: headline, widget: string}
      - name: ticker
        label: Ticker Items
        widget: list
        field: {label: Item, name: ticker, widget: string}

  - name: "mission"
    label: "Mission Statement"
    file: "data/mission.yaml"
    fields:
      - {label: Text, name: text, widget: string}

  - name: "products"
    label: "Products"
    file: "data/products.yaml"
    fields:
      - name: peaks
        label: Peak Products
        widget: list
        fields:
          - {label: Kicker, name: kicker, widget: string}
          - {label: Headline, name: headline, widget: string}
          - {label: Mockup Title, name: mockup_title, widget: string}
          - {label: Result Label, name: result_label, widget: string}
          - {label: Result Text, name: result_text, widget: string}

  - name: "industries"
    label: "Industries"
    file: "data/industries.yaml"
    fields:
      - {label: Headline, name: headline, widget: string}
      - name: items
        label: Industry Items
        widget: list
        fields:
          - {label: Number, name: num, widget: string}
          - {label: Name, name: name, widget: string}
          - {label: Subtitle, name: subtitle, widget: string}
          - {label: Headline, name: headline, widget: string}
          - {label: Body, name: body, widget: text}
          - {label: Stat 1 Value, name: stat1_val, widget: string}
          - {label: Stat 1 Description, name: stat1_desc, widget: string}
          - {label: Stat 2 Value, name: stat2_val, widget: string}
          - {label: Stat 2 Description, name: stat2_desc, widget: string}

  - name: "metrics"
    label: "Metrics Section"
    file: "data/metrics.yaml"
    fields:
      - {label: Headline, name: headline, widget: string}
      - {label: Lede, name: lede, widget: string}
      - name: bullets
        label: Bullet Points
        widget: list
        field: {label: Bullet, name: bullets, widget: string}

  - name: "about"
    label: "About Section"
    file: "data/about.yaml"
    fields:
      - {label: Headline, name: headline, widget: string}
      - name: descriptions
        label: Descriptions
        widget: list
        field: {label: Text, name: descriptions, widget: text}
      - name: founders
        label: Founders
        widget: list
        fields:
          - {label: Name, name: name, widget: string}
          - {label: Role, name: role, widget: string}
          - {label: Bio, name: bio, widget: text}
          - {label: Image, name: image, widget: string}

  - name: "contact"
    label: "Contact Section"
    file: "data/contact.yaml"
    fields:
      - {label: Headline, name: headline, widget: string}
      - {label: Email, name: email, widget: string}

  - name: "footer"
    label: "Footer"
    file: "data/footer.yaml"
    fields:
      - {label: Copyright, name: copyright, widget: string}
      - name: links
        label: Links
        widget: list
        fields:
          - {label: Label, name: label, widget: string}
          - {label: URL, name: url, widget: string}
